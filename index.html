<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Amor 💕</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="hearts-bg"></div>
  <button id="music-btn" onclick="toggleMusic()">🔊</button>
  <audio id="bg-music" loop src="music/song.mp3"></audio>

  <div class="card" id="main-card">
    <p class="subtitle">✨ Un message rien que pour toi ✨</p>
    <h1 class="title">Veux-tu être mi novio ?</h1>
    <div class="gif-wrap">
      <img id="main-gif" src="https://media.tenor.com/qyl20J82hZgAAAAM/me-and-him-both-in-love.gif" alt="kawaii couple" />
    </div>
    <p class="question" id="question-text">💝 Dis-moi oui... s'il te plaît ?</p>
    <div class="btn-row">
      <button class="btn-yes" onclick="goYes()">Oui 💕</button>
      <button class="btn-no" id="btn-no" onclick="clickNo()">Non 😒</button>
    </div>
  </div>

  <div id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
